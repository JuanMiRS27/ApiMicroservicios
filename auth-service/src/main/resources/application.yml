server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:1234567890123456789012345678901234567890}
    internal-api-key: ${APP_SECURITY_INTERNAL_API_KEY:inventory-internal-key}
  clients:
    reporting:
      base-url: ${APP_CLIENTS_REPORTING_BASE_URL:http://localhost:8084}

logging:
  level:
    org.springframework.security: INFO
