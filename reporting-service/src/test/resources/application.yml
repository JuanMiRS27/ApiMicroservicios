spring:
  datasource:
    url: jdbc:h2:mem:reportingdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: never

app:
  security:
    jwt:
      secret: 1234567890123456789012345678901234567890
  clients:
    catalog:
      base-url: http://localhost:8082
    inventory:
      base-url: http://localhost:8083
