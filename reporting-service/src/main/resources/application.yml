server:
  port: ${PORT:${SERVER_PORT:8084}}
  forward-headers-strategy: framework

spring:
  application:
    name: reporting-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5436}/${PGDATABASE:reporting_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:20000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:5000}
      data-source-properties:
        sslmode: ${SPRING_DATASOURCE_SSLMODE:${PGSSLMODE:disable}}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:1234567890123456789012345678901234567890}
    internal-api-key: ${APP_SECURITY_INTERNAL_API_KEY:inventory-internal-key}
  clients:
    catalog:
      base-url: ${APP_CLIENTS_CATALOG_BASE_URL:http://localhost:8082}
    inventory:
      base-url: ${APP_CLIENTS_INVENTORY_BASE_URL:http://localhost:8083}
